<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TriMed | Cadastro e Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #edf4ff;
      --surface: #ffffff;
      --line: #cfe2ff;
      --text: #142543;
      --muted: #5c6f8f;
      --brand: #006ce4;
      --brand-strong: #0053b2;
      --accent: #ff7a1a;
      --ok: #157a5a;
      --radius: 14px;
      --max: 820px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Source Sans 3", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 5% 0%, rgba(0, 108, 228, 0.2), transparent 30%),
        radial-gradient(circle at 96% 8%, rgba(255, 122, 26, 0.2), transparent 26%),
        linear-gradient(165deg, var(--bg), #ffffff);
      min-height: 100vh;
    }

    .container {
      width: min(94%, var(--max));
      margin: 0 auto;
    }

    .top {
      padding: 14px 0;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border-radius: 11px;
      background: linear-gradient(145deg, var(--brand), #00a6ff 50%, #34d399);
      position: relative;
      box-shadow: 0 10px 22px rgba(0, 108, 228, 0.25);
    }

    .logo-mark::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 2px;
      left: 10px;
      top: 17px;
      background: #fff;
      box-shadow: 0 -5px 0 #fff, 0 5px 0 #fff;
    }

    .logo-mark::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 7px;
      right: 6px;
      top: 6px;
      border-radius: 50%;
      background: #fff;
    }

    .box {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 14px 30px rgba(15, 55, 108, 0.12);
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 10px;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
    }

    .muted {
      color: var(--muted);
      margin-top: 0;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .tab {
      border: 1px solid #c8dcff;
      background: #eef5ff;
      color: #35537d;
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab.active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    form {
      display: grid;
      gap: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    label {
      font-weight: 700;
      color: #34506f;
      font-size: 0.92rem;
    }

    input,
    select {
      width: 100%;
      border: 1px solid #c8dbf6;
      border-radius: 10px;
      padding: 10px;
      font: inherit;
      margin-top: 4px;
      background: #fff;
      color: var(--text);
    }

    .submit {
      border: 0;
      border-radius: 10px;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      min-height: 42px;
      cursor: pointer;
    }

    .submit:hover {
      background: var(--brand-strong);
    }

    .hidden {
      display: none;
    }

    .status {
      margin: 8px 0 12px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #cce3ff;
      color: #27517e;
      background: #edf6ff;
      font-weight: 600;
      display: none;
    }

    .status.ok {
      border-color: #cdeedd;
      color: #1f5b45;
      background: #edf9f3;
    }

    .back {
      margin-top: 12px;
      display: inline-block;
      text-decoration: none;
      color: #2e4f7b;
      font-weight: 700;
    }

    @media (max-width: 700px) {
      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="top container">
    <a class="logo" href="trimedsite.html">
      <span class="logo-mark"></span>
      TriMed
    </a>
  </header>

  <main class="container box">
    <h1>Cadastro e Login TriMed</h1>
    <p class="muted">Crie sua conta como paciente ou médico. Depois, entre com email e senha para voltar à tela inicial com seu perfil ativo.</p>

    <div class="tabs">
      <button class="tab active" type="button" id="tabPaciente">Cadastro paciente</button>
      <button class="tab" type="button" id="tabMedico">Cadastro médico</button>
      <button class="tab" type="button" id="tabLogin">Login</button>
    </div>

    <div id="statusMsg" class="status"></div>

    <form id="formPaciente">
      <div class="row">
        <label>Nome completo
          <input id="pacNome" type="text" required />
        </label>
        <label>CPF
          <input id="pacCpf" type="text" required />
        </label>
      </div>
      <div class="row">
        <label>Email
          <input id="pacEmail" type="email" required />
        </label>
        <label>Telefone
          <input id="pacTelefone" type="tel" required />
        </label>
      </div>
      <label>Senha
        <input id="pacSenha" type="password" minlength="6" required />
      </label>
      <button class="submit" type="submit">Criar cadastro de paciente</button>
    </form>

    <form id="formMedico" class="hidden">
      <div class="row">
        <label>Nome completo
          <input id="medNome" type="text" required />
        </label>
        <label>CRM
          <input id="medCrm" type="text" required />
        </label>
      </div>
      <div class="row">
        <label>Especialidade
          <input id="medEsp" type="text" required />
        </label>
        <label>Cidade
          <input id="medCidade" type="text" value="Brasília" required />
        </label>
      </div>
      <div class="row">
        <label>Email profissional
          <input id="medEmail" type="email" required />
        </label>
        <label>Telefone
          <input id="medTelefone" type="tel" required />
        </label>
      </div>
      <label>Senha
        <input id="medSenha" type="password" minlength="6" required />
      </label>
      <button class="submit" type="submit">Criar cadastro médico</button>
    </form>

    <form id="formLogin" class="hidden">
      <div class="row">
        <label>Perfil
          <select id="loginPerfil" required>
            <option value="paciente">Paciente</option>
            <option value="medico">Médico</option>
          </select>
        </label>
        <label>Email
          <input id="loginEmail" type="email" required />
        </label>
      </div>
      <label>Senha
        <input id="loginSenha" type="password" required />
      </label>
      <button class="submit" type="submit">Entrar na TriMed</button>
    </form>

    <a class="back" href="trimedsite.html">Voltar para a busca</a>
  </main>

  <script>
    (function () {
      const tabPaciente = document.getElementById("tabPaciente");
      const tabMedico = document.getElementById("tabMedico");
      const tabLogin = document.getElementById("tabLogin");
      const formPaciente = document.getElementById("formPaciente");
      const formMedico = document.getElementById("formMedico");
      const formLogin = document.getElementById("formLogin");
      const loginEmail = document.getElementById("loginEmail");
      const loginSenha = document.getElementById("loginSenha");
      const loginPerfil = document.getElementById("loginPerfil");
      const statusMsg = document.getElementById("statusMsg");

      function getUsers() {
        const raw = localStorage.getItem("trimed_users");
        return raw ? JSON.parse(raw) : [];
      }

      function setUsers(users) {
        localStorage.setItem("trimed_users", JSON.stringify(users));
      }

      function setCurrentUser(email) {
        localStorage.setItem("trimed_current_user", email);
      }

      function showStatus(msg, ok) {
        statusMsg.style.display = "block";
        statusMsg.textContent = msg;
        statusMsg.classList.toggle("ok", Boolean(ok));
      }

      function clearStatus() {
        statusMsg.style.display = "none";
        statusMsg.classList.remove("ok");
      }

      function resetTabs() {
        tabPaciente.classList.remove("active");
        tabMedico.classList.remove("active");
        tabLogin.classList.remove("active");
      }

      function hideForms() {
        formPaciente.classList.add("hidden");
        formMedico.classList.add("hidden");
        formLogin.classList.add("hidden");
      }

      function showPaciente() {
        resetTabs();
        hideForms();
        clearStatus();
        tabPaciente.classList.add("active");
        formPaciente.classList.remove("hidden");
      }

      function showMedico() {
        resetTabs();
        hideForms();
        clearStatus();
        tabMedico.classList.add("active");
        formMedico.classList.remove("hidden");
      }

      function showLogin() {
        resetTabs();
        hideForms();
        tabLogin.classList.add("active");
        formLogin.classList.remove("hidden");
      }

      tabPaciente.addEventListener("click", showPaciente);
      tabMedico.addEventListener("click", showMedico);
      tabLogin.addEventListener("click", showLogin);

      if (window.location.hash === "#medico") {
        showMedico();
      } else if (window.location.hash === "#login") {
        showLogin();
      }

      formPaciente.addEventListener("submit", function (event) {
        event.preventDefault();

        const email = document.getElementById("pacEmail").value.trim().toLowerCase();
        const users = getUsers();
        if (users.some(function (u) { return u.email === email; })) {
          showStatus("Este email já está cadastrado. Tente fazer login.", false);
          showLogin();
          loginEmail.value = email;
          return;
        }

        users.push({
          type: "paciente",
          name: document.getElementById("pacNome").value.trim(),
          cpf: document.getElementById("pacCpf").value.trim(),
          email: email,
          phone: document.getElementById("pacTelefone").value.trim(),
          password: document.getElementById("pacSenha").value,
          city: "Brasília",
          photo: "",
          addresses: []
        });

        setUsers(users);
        showLogin();
        loginEmail.value = email;
        loginPerfil.value = "paciente";
        showStatus("Cadastro de paciente realizado. Agora faça login.", true);
      });

      formMedico.addEventListener("submit", function (event) {
        event.preventDefault();

        const email = document.getElementById("medEmail").value.trim().toLowerCase();
        const users = getUsers();
        if (users.some(function (u) { return u.email === email; })) {
          showStatus("Este email já está cadastrado. Tente fazer login.", false);
          showLogin();
          loginEmail.value = email;
          return;
        }

        users.push({
          type: "medico",
          name: document.getElementById("medNome").value.trim(),
          crm: document.getElementById("medCrm").value.trim(),
          specialty: document.getElementById("medEsp").value.trim(),
          email: email,
          phone: document.getElementById("medTelefone").value.trim(),
          password: document.getElementById("medSenha").value,
          city: document.getElementById("medCidade").value.trim() || "Brasília",
          photo: "",
          addresses: []
        });

        setUsers(users);
        showLogin();
        loginEmail.value = email;
        loginPerfil.value = "medico";
        showStatus("Cadastro médico realizado. Agora faça login.", true);
      });

      formLogin.addEventListener("submit", function (event) {
        event.preventDefault();

        const email = loginEmail.value.trim().toLowerCase();
        const senha = loginSenha.value;
        const perfil = loginPerfil.value;
        const users = getUsers();

        const user = users.find(function (u) {
          return u.email === email && u.password === senha && u.type === perfil;
        });

        if (!user) {
          showStatus("Login inválido. Verifique email, perfil e senha.", false);
          return;
        }

        setCurrentUser(user.email);
        showStatus("Login efetuado. Redirecionando para a TriMed...", true);
        setTimeout(function () {
          window.location.href = "trimedsite.html";
        }, 700);
      });
    })();
  </script>
</body>
</html>
